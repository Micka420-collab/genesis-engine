# Genesis Network — reverse proxy nginx (site + API + flux SSE).
# Remplacer SERVER_NAME par ton domaine, puis activer TLS via certbot :
#   sudo certbot --nginx -d genesis.exemple.org

server {
    listen 80;
    server_name genesis.exemple.org;

    # Site mondial + API REST.
    location / {
        proxy_pass http://127.0.0.1:8770;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flux temps réel (Server-Sent Events) : pas de buffering, connexion longue.
    location /api/events {
        proxy_pass http://127.0.0.1:8770;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
