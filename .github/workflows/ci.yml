name: ci

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Environment doctor
        run: make doctor

      - name: Compile Python sources
        run: make compile-python

      - name: Run Python tests
        run: make test-python

      - name: P0 smoke (operational runtime sanity)
        run: PYTHONPATH=runtime python runtime/scripts/p0_smoke.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            scaffolding/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('scaffolding/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check (non-blocking)
        working-directory: scaffolding
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Cargo check
        working-directory: scaffolding
        run: cargo check --workspace

      - name: Cargo test (deterministic scenarios + Phase 3 hardening)
        working-directory: scaffolding
        run: cargo test --workspace --all-features

