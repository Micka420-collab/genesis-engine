name: ci

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Environment doctor
        run: make doctor

      - name: Compile Python sources
        run: make compile-python

      - name: Run Python tests
        run: make test-python

      - name: P0 smoke
        run: PYTHONPATH=runtime python runtime/scripts/p0_smoke.py

      - name: Realism smokes p72–p82
        run: |
          export PYTHONPATH=runtime
          for s in p72_world_atmosphere_smoke.py p73_rust_worldgraph_smoke.py \
            p74_koeppen_harness_smoke.py p75_koeppen_grid_smoke.py \
            p76_multi_rate_coupler_smoke.py p77_epidemic_contact_smoke.py \
            p78_pbr_render_smoke.py p79_vision_observation_smoke.py \
            p80_koeppen_genesis_smoke.py p81_hydrology_smoke.py \
            p82_observation_sse_smoke.py; do
            echo "=== $s ==="
            python "runtime/scripts/$s" || exit 1
          done

  rust-world-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/world-engine/target
          key: ${{ runner.os }}-world-engine-${{ hashFiles('native/world-engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-world-engine-

      - name: Cargo test (core, biome, worldgraph)
        working-directory: native/world-engine
        run: |
          cargo test -p genesis-core -p genesis-biome -p genesis-worldgraph -- --nocapture

  maturin-pybindings:
    runs-on: ubuntu-latest
    needs: rust-world-engine
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build genesis_world wheel
        working-directory: native/world-engine
        run: maturin build -m crates/pybindings/Cargo.toml --release

      - name: Install wheel and smoke native bridge
        working-directory: native/world-engine
        run: |
          pip install target/wheels/genesis_world-*.whl
          PYTHONPATH=../../runtime python ../../runtime/scripts/p73_rust_worldgraph_smoke.py

  rust-scaffolding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cargo check scaffolding
        working-directory: scaffolding
        run: cargo check --workspace
