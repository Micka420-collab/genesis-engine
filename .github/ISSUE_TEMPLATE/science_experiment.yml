name: Science experiment
description: Reproducible experiment or calibration study
title: "[science]: "
labels: ["science"]
body:
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
    validations:
      required: true
  - type: input
    id: seed
    attributes:
      label: PRF seed (hex ok)
      placeholder: "0xC0FFEE"
  - type: textarea
    id: metrics
    attributes:
      label: Metrics to record (Köppen kappa, R0, TPS, etc.)
  - type: checkboxes
    id: fair
    attributes:
      label: FAIR checklist
      options:
        - label: Manifest with seed + checksums
        - label: Smoke or pytest added
        - label: Artifact path documented
