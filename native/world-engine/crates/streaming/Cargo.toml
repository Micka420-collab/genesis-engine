[package]
name        = "genesis-streaming"
version     = { workspace = true }
edition     = { workspace = true }
license     = { workspace = true }
description = "Chunk manager — async load/unload + LOD"

[dependencies]
genesis-core      = { path = "../core" }
genesis-noise     = { path = "../noise" }
genesis-terrain   = { path = "../terrain" }
genesis-climate   = { path = "../climate" }
genesis-biome     = { path = "../biome" }
genesis-hydrology = { path = "../hydrology" }
genesis-ecosystem = { path = "../ecosystem" }
genesis-persist   = { path = "../persist" }
genesis-macro-bridge = { path = "../macro-bridge" }

glam       = { workspace = true }
tokio      = { workspace = true }
rayon      = { workspace = true }
dashmap      = { workspace = true }
parking_lot  = { workspace = true }
serde      = { workspace = true }
smallvec   = { workspace = true }
thiserror  = { workspace = true }
tracing    = { workspace = true }

[dev-dependencies]
tokio              = { version = "1.40", features = ["macros", "rt-multi-thread", "time", "test-util"] }
tracing-subscriber = { workspace = true }
blake3             = { workspace = true }
criterion          = { workspace = true }
genesis-worldgraph = { path = "../worldgraph" }
genesis-cache      = { path = "../cache" }
genesis-intent     = { path = "../intent" }
genesis-terrain    = { path = "../terrain" }
serde              = { workspace = true }

[[example]]
name = "demo_world"
path = "examples/demo_world.rs"

[[example]]
name = "worldgraph_demo"
path = "examples/worldgraph_demo.rs"

[[example]]
name = "intent_prefetch_demo"
path = "examples/intent_prefetch_demo.rs"

[[bench]]
name    = "chunk_bench"
harness = false
path    = "benches/chunk_bench.rs"
