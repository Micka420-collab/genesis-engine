<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Genesis Engine — Observation Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e1116; color: #d8dee9; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
header { padding: 14px 20px; border-bottom: 1px solid #1f2530; display: flex; justify-content: space-between; align-items: center; }
h1 { font-size: 18px; font-weight: 600; color: #88c0d0; }
.grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1px; background: #1f2530; }
.panel { background: #0e1116; padding: 14px 20px; min-height: 280px; }
.kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0 14px 0; }
.kpi { background: #161b22; padding: 8px 12px; border-radius: 4px; border-left: 3px solid #88c0d0; }
.kpi .label { color: #6e7888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.kpi .value { color: #eceff4; font-size: 20px; font-weight: 700; margin-top: 2px; }
canvas { display: block; background: #181c23; border-radius: 4px; }
#worldCanvas { width: 100%; height: 480px; }
#chartCanvas { width: 100%; height: 200px; margin-top: 8px; }
.section-title { color: #88c0d0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.legend { display: flex; gap: 10px; font-size: 11px; color: #a0aaba; margin-top: 6px; flex-wrap: wrap; }
.legend span::before { content: ''; display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.agent-list { font-size: 11px; max-height: 360px; overflow-y: auto; }
.agent-row { display: grid; grid-template-columns: 40px 70px 60px 80px 80px; gap: 4px; padding: 3px 4px; border-bottom: 1px solid #1a1f28; cursor: pointer; }
.agent-row:hover { background: #161b22; }
.tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.events { font-size: 11px; color: #a0aaba; max-height: 200px; overflow-y: auto; }
.event-line { padding: 2px 0; }
.event-line.birth { color: #a3be8c; }
.event-line.death { color: #bf616a; }
.event-line.fight { color: #d08770; }
.event-line.share { color: #88c0d0; }
.event-line.mating { color: #b48ead; }
#agentDetail { background: #161b22; padding: 10px; margin-top: 10px; font-size: 11px; border-radius: 4px; min-height: 150px; }
.bar { background: #1a1f28; height: 6px; border-radius: 3px; overflow: hidden; margin: 2px 0 6px 0; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #5e81ac, #88c0d0); }
.bar-fill.danger { background: linear-gradient(90deg, #d08770, #bf616a); }
.tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.tabs button { background: #1a1f28; color: #a0aaba; border: 1px solid #2a3140; padding: 4px 10px; border-radius: 3px; font-family: inherit; font-size: 11px; cursor: pointer; }
.tabs button.active { background: #2a3140; color: #88c0d0; }
</style></head>
<body>
<header>
  <h1>Genesis Engine — Observation Dashboard</h1>
  <div id="status" style="color:#6e7888; font-size:12px;">connecting…</div>
</header>
<section class="kpis" style="padding: 0 20px;">
  <div class="kpi"><div class="label">Tick</div><div class="value" id="kpiTick">—</div></div>
  <div class="kpi"><div class="label">Alive</div><div class="value" id="kpiAlive">—</div></div>
  <div class="kpi"><div class="label">Births</div><div class="value" id="kpiBirths">—</div></div>
  <div class="kpi"><div class="label">Deaths</div><div class="value" id="kpiDeaths">—</div></div>
  <div class="kpi"><div class="label">Events</div><div class="value" id="kpiEvents">—</div></div>
  <div class="kpi"><div class="label">TPS</div><div class="value" id="kpiTps">—</div></div>
</section>
<div class="grid">
  <div class="panel">
    <div class="section-title">God-mode (top-down)</div>
    <div class="tabs">
      <button class="active" data-view="biome">Biome</button>
      <button data-view="culture">Culture</button>
      <button data-view="action">Action</button>
      <button data-view="hunger">Hunger</button>
    </div>
    <canvas id="worldCanvas" width="900" height="480"></canvas>
    <div class="legend" id="biomeLegend"></div>
    <div class="section-title" style="margin-top:14px">Population over time</div>
    <canvas id="chartCanvas" width="900" height="200"></canvas>
    <div class="legend">
      <span style="color:#a3be8c">● population</span>
      <span style="color:#88c0d0">● matings</span>
      <span style="color:#d08770">● fights</span>
      <span style="color:#bf616a">● deaths (cum)</span>
    </div>
  </div>
  <div class="panel">
    <div class="section-title">Live agents (click to inspect)</div>
    <div class="agent-list" id="agentList"></div>
    <div class="section-title" style="margin-top:14px">Selected agent</div>
    <div id="agentDetail">No agent selected.</div>
    <div class="section-title" style="margin-top:14px">Recent events</div>
    <div class="events" id="events">—</div>
  </div>
</div>
<script>
const API = "";
const C = document.getElementById('worldCanvas');
const CTX = C.getContext('2d');
const CH = document.getElementById('chartCanvas');
const CHCTX = CH.getContext('2d');
let view = 'biome';
let lastSnap = null, prevTick = 0, prevTime = performance.now();
let selectedRow = null;
let cachedEvents = [];

const BIOMES = {
  0: '#0050b4', 1: '#ebfaff', 2: '#c8d7c8', 3: '#3c6446', 4: '#509146',
  5: '#326e3c', 6: '#c8c864', 7: '#f0d791', 8: '#d2c8af', 9: '#dcc36e',
  10: '#8caf5a', 11: '#288c50'
};
const BIOME_NAMES = ['Ocean','Ice','Tundra','BorealForest','TemperateForest','TempRainforest','Grassland','HotDesert','ColdDesert','Savanna','TropDryForest','TropRainforest'];

document.getElementById('biomeLegend').innerHTML = BIOME_NAMES.map((n,i)=>`<span style="color:${BIOMES[i]}">● ${n}</span>`).join('');

document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  view = b.dataset.view;
}));

async function refresh() {
  try {
    const snap = await (await fetch(API+'/api/state')).json();
    const agents = await (await fetch(API+'/api/agents')).json();
    const metrics = await (await fetch(API+'/api/metrics')).json();
    drawWorld(agents.agents);
    drawChart(metrics);
    drawAgentList(agents.agents);
    updateKPIs(snap, agents.agents.length);
    document.getElementById('status').textContent = `sim ${snap.sim_id.slice(0,8)} • ${snap.last_tick_ms.toFixed(0)}ms/tick`;
  } catch(e) { document.getElementById('status').textContent = 'error: '+e.message; }
}

function updateKPIs(snap, alive) {
  document.getElementById('kpiTick').textContent = snap.tick;
  document.getElementById('kpiAlive').textContent = alive;
  document.getElementById('kpiBirths').textContent = snap.cum_births;
  document.getElementById('kpiDeaths').textContent = snap.cum_deaths;
  document.getElementById('kpiEvents').textContent = snap.cum_events;
  const now = performance.now();
  if (snap.tick > prevTick) {
    const tps = (snap.tick - prevTick) / ((now - prevTime) / 1000.0);
    document.getElementById('kpiTps').textContent = tps.toFixed(1);
  }
  prevTick = snap.tick; prevTime = now;
}

function drawWorld(agents) {
  const W = CTX.canvas.width, H = CTX.canvas.height;
  CTX.fillStyle = '#181c23'; CTX.fillRect(0,0,W,H);
  if (!agents.length) return;
  let minX=1e9, maxX=-1e9, minY=1e9, maxY=-1e9;
  agents.forEach(a => {minX=Math.min(minX,a.pos[0]); maxX=Math.max(maxX,a.pos[0]); minY=Math.min(minY,a.pos[1]); maxY=Math.max(maxY,a.pos[1]);});
  const pad = 50;
  minX -= pad; maxX += pad; minY -= pad; maxY += pad;
  const sX = W / (maxX - minX), sY = H / (maxY - minY);
  const s = Math.min(sX, sY);
  agents.forEach(a => {
    const x = (a.pos[0] - minX) * s;
    const y = (a.pos[1] - minY) * s;
    let color = '#88c0d0';
    if (view === 'biome') color = '#88c0d0';
    else if (view === 'culture') color = ['#a3be8c','#d08770','#88c0d0','#b48ead','#ebcb8b'][a.culture % 5];
    else if (view === 'action') color = ['#6e7888','#88c0d0','#5e81ac','#a3be8c','#b48ead','#a3be8c','#ebcb8b','#bf616a','#88c0d0','#a3be8c','#bf616a','#d08770','#bf616a','#ebcb8b'][a.action] || '#88c0d0';
    else if (view === 'hunger') {
      const h = Math.min(1, a.drives[0]);
      color = `rgb(${Math.floor(80 + 175*h)},${Math.floor(180 - 100*h)},${Math.floor(140 - 100*h)})`;
    }
    CTX.fillStyle = color;
    const r = a.gen === 0 ? 4 : (3 + Math.min(2, a.gen * 0.5));
    CTX.beginPath(); CTX.arc(x, y, r, 0, Math.PI*2); CTX.fill();
    if (a.row === selectedRow) {
      CTX.strokeStyle = '#ebcb8b'; CTX.lineWidth = 2;
      CTX.beginPath(); CTX.arc(x, y, r+3, 0, Math.PI*2); CTX.stroke();
    }
  });
}

function drawChart(m) {
  const W = CH.width, H = CH.height;
  CHCTX.fillStyle = '#181c23'; CHCTX.fillRect(0,0,W,H);
  if (!m.tick.length) return;
  const N = m.tick.length;
  const maxPop = Math.max(1, ...m.population);
  const maxDeath = Math.max(1, ...m.deaths_cum);
  function line(arr, color, max) {
    CHCTX.strokeStyle = color; CHCTX.lineWidth = 1.5; CHCTX.beginPath();
    for (let i = 0; i < N; i++) {
      const x = (i / Math.max(1, N - 1)) * W;
      const y = H - (arr[i] / max) * (H - 10) - 5;
      if (i === 0) CHCTX.moveTo(x, y); else CHCTX.lineTo(x, y);
    }
    CHCTX.stroke();
  }
  line(m.population, '#a3be8c', maxPop);
  line(m.matings_cum, '#88c0d0', Math.max(1, ...m.matings_cum));
  line(m.fights_cum, '#d08770', Math.max(1, ...m.fights_cum));
  line(m.deaths_cum, '#bf616a', maxDeath);
}

function drawAgentList(agents) {
  const el = document.getElementById('agentList');
  agents.sort((a,b)=> b.gen - a.gen || a.row - b.row);
  el.innerHTML = agents.slice(0, 30).map(a => `
    <div class="agent-row" onclick="selectAgent(${a.row})">
      <div>${a.row}</div>
      <div>gen ${a.gen}</div>
      <div>cult ${a.culture}</div>
      <div>off ${a.offspring}</div>
      <div style="color:#bf616a">H ${a.drives[0].toFixed(2)}</div>
    </div>`).join('');
}

async function selectAgent(row) {
  selectedRow = row;
  const r = await (await fetch(API+'/api/agent?row='+row)).json();
  const drives = r.drives || {};
  const p = r.personality || {};
  function bar(label, v, max, dangerAbove) {
    const pct = Math.min(100, (v/max)*100);
    const cls = (dangerAbove && v >= dangerAbove) ? 'danger' : '';
    return `<div>${label}: ${v.toFixed(2)}</div><div class="bar"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
  }
  document.getElementById('agentDetail').innerHTML = `
    <div><b>${r.uuid.slice(0,8)}…</b> · gen ${r.generation} · culture ${r.culture} · ${r.alive?'alive':'dead'}</div>
    <div style="color:#6e7888">pos (${r.pos[0].toFixed(1)}, ${r.pos[1].toFixed(1)}) · age ${r.born_tick}t · ${r.offspring} offspring · ${r.relations_count} relations</div>
    <div style="margin-top:6px">${bar('hunger', drives.hunger||0, 1.5, 0.85)}${bar('thirst', drives.thirst||0, 1.5, 0.85)}${bar('vitality', r.vitality, 1.0)}</div>
    <div style="color:#a0aaba; font-size:10px; margin-top:6px">
      O ${p.openness.toFixed(2)} · C ${p.conscientiousness.toFixed(2)} · E ${p.extraversion.toFixed(2)} · A ${p.agreeableness.toFixed(2)} · N ${p.neuroticism.toFixed(2)}<br>
      ambition ${p.ambition.toFixed(2)} · risk ${p.risk_tolerance.toFixed(2)} · aggression ${p.aggression.toFixed(2)} · curiosity ${p.curiosity.toFixed(2)}
    </div>
  `;
}

setInterval(refresh, 1000);
refresh();
</script>
</body></html>
